<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- Soft drop shadow for realism -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="15" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111" />
      <stop offset="45%" stop-color="#2a2a2a" />
      <stop offset="55%" stop-color="#111" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <linearGradient id="lensGlare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="30%" stop-color="rgba(255,255,255,0.0)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)" />
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <!-- Bridge -->
    <path d="M 360 100 Q 400 80 440 100 L 440 115 Q 400 95 360 115 Z" fill="#222" />
    
    <!-- Left Frame -->
    <path d="M 100 80 C 180 60, 320 60, 360 100 C 370 140, 340 220, 240 230 C 140 240, 90 200, 80 120 Z" fill="none" stroke="url(#frameGrad)" stroke-width="24" stroke-linejoin="round" />
    
    <!-- Right Frame -->
    <path d="M 700 80 C 620 60, 480 60, 440 100 C 430 140, 460 220, 560 230 C 660 240, 710 200, 720 120 Z" fill="none" stroke="url(#frameGrad)" stroke-width="24" stroke-linejoin="round" />

    <!-- Left Lens Glare -->
    <path d="M 100 80 C 180 60, 320 60, 360 100 C 370 140, 340 220, 240 230 C 140 240, 90 200, 80 120 Z" fill="url(#lensGlare)" />
    
    <!-- Right Lens Glare -->
    <path d="M 700 80 C 620 60, 480 60, 440 100 C 430 140, 460 220, 560 230 C 660 240, 710 200, 720 120 Z" fill="url(#lensGlare)" />
    
    <!-- Left Temple (Arm) partial view for 3D feel -->
    <path d="M 80 100 L 20 85 L 20 105 L 75 120 Z" fill="#151515" />
    
    <!-- Right Temple (Arm) -->
    <path d="M 720 100 L 780 85 L 780 105 L 725 120 Z" fill="#151515" />
  </g>
</svg>
